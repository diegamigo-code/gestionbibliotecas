services:
  mysql:
    image: mysql:8.4
    container_name: multas-mysql
    restart: always
    environment:
      MYSQL_DATABASE: dev_multas
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3313:3306"
    networks:
      - multas-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  eurekaserver:
    build:
      context: ../eurekaserver
    image: eurekaserver:1.0
    container_name: multas-eurekaserver
    ports:
      - "8761:8761"
    networks:
      - multas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

  multas:
    build:
      context: .
    image: multas:1.0
    container_name: multas-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    ports:
      - "8087:8087"
    networks:
      - multas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s

networks:
  multas-network:
    driver: bridge
