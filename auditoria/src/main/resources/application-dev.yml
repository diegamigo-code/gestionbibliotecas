spring:
  application:
    name: dev.auditoria

  datasource:
    url: jdbc:mysql://localhost:3306/dev_auditoria
    username: dev
    password: dev123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    discovery:
      enabled: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  enable-hateoas: false

eureka:
  client:
    enabled: false

logging:
  level:
    dev.diemigo.auditoria: DEBUG
    org.hibernate.SQL: WARN