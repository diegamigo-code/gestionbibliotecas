spring:
  application:
    name: reservas

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-reservas:3306/dev_reservas?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
    username: dev
    password: dev123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://eurekaserver:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

server:
  port: 8082
