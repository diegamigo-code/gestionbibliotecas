spring:
  application:
    name: proveedores

  datasource:
    url: jdbc:mysql://localhost:3306/prod_proveedores?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: prod
    password: prod123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8083}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: "*"
